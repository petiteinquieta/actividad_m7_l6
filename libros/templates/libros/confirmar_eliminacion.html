{% extends 'libros/base.html' %}

{% block title %}Eliminar libro{% endblock %}

{% block content %}
<h2>Confirmar eliminación</h2>

<p>¿Seguro que deseas eliminar el libro "<strong>{{ libro.titulo }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<br>
<a href="{% url 'listar_libros' %}">Cancelar</a>
{% endblock %}
