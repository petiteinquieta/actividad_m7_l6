{% extends 'libros/base.html' %}

{% block title %}
    {% if libro %}Editar libro{% else %}Crear libro{% endif %}
{% endblock %}

{% block content %}
<h2>
    {% if libro %}
        Editar libro
    {% else %}
        Crear libro
    {% endif %}
</h2>

<form method="post">
    {% csrf_token %}

    <label for="titulo">Título:</label><br>
    <input type="text" name="titulo" id="titulo" value="{{ libro.titulo|default:'' }}"><br><br>

    <label for="autor">Autor:</label><br>
    <input type="text" name="autor" id="autor" value="{{ libro.autor|default:'' }}"><br><br>

    <label for="anio_publicacion">Año de publicación:</label><br>
    <input type="number" name="anio_publicacion" id="anio_publicacion" value="{{ libro.anio_publicacion|default:'' }}"><br><br>

    <button type="submit">Guardar</button>
</form>

<br>
<a href="{% url 'listar_libros' %}">Volver a la lista</a>
{% endblock %}
